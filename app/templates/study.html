{% extends "base.html" %}

{% block content %}

<div class="study-panel">

    <div class="form-wrapper">
        <form method="post" action="/study/add">
            <input name="name" placeholder="Tên quán" required>
            <input name="address" placeholder="Địa chỉ" required>
            <input name="note" placeholder="Ghi chú">
            <button type="submit">+ Thêm</button>
        </form>
    </div>

    <div class="list-wrapper">

        {% for s in studies %}
        <div class="study-row">

            <div class="row-text">
                <b>{{ s.name }}</b>
                <span>• {{ s.note }}</span>
            </div>

            <div class="actions">

                <a href="https://www.google.com/maps/search/?api=1&query={{ s.address | replace(' ', '+') }}"
                   target="_blank"
                   class="map-icon"
                   title="{{ s.address }}">
                   📍
                </a>

                <a href="/study/edit/{{ s.id }}" class="edit-icon">✏️</a>
                <a href="/study/delete/{{ s.id }}" class="delete-icon">🗑</a>

            </div>

            <!-- 🔥 GIF -->
            <div class="gif-box">
                <div class="tenor-gif-embed"
                     data-postid="13698592"
                     data-share-method="host"
                     data-aspect-ratio="1"
                     data-width="100%">
                </div>
            </div>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
