<!DOCTYPE html>
<html>
<head>
    <title>Just us being goofy </title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css?v=2">

    <meta charset="UTF-8">
</head>

<body>

    <!-- VIDEO BACKGROUND -->
    <video autoplay muted loop id="bg-video">
        <source src="/static/{{ bg if bg else 'bghome.mp4' }}?v=2" type="video/mp4">
    </video>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/food">Ăn uống</a>
        <a href="/study">Học tập</a>
        <a href="/plan">Plan</a>
    </div>

    <!-- CONTENT -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <!-- 🔥 TENOR SCRIPT (PHẢI Ở CUỐI) -->
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>

</body>
</html>
